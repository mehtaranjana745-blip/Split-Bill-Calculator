<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Split Bill Calculator | Stellar Testnet</title>
    <meta name="description" content="A dApp to split bills and send payments on the Stellar Testnet using Freighter Wallet.">
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Split Bill Calculator</h1>
            <p class="subtitle">Stellar Testnet Edition</p>
            <div id="wallet-section">
                <button id="connect-btn" class="btn primary">Connect Wallet</button>
                <div id="wallet-info" class="hidden">
                    <span id="pubkey-display" class="glass-pill"></span>
                    <span id="balance-display" class="glass-pill"></span>
                    <button id="disconnect-btn" class="btn secondary small">Disconnect</button>
                </div>
            </div>
            <div id="network-warning" class="alert warning hidden">
                Please switch your Freighter wallet to the Testnet.
            </div>
        </header>

        <main id="main-content" class="disabled-overlay">
            <div class="card glass">
                <h2>Calculate Split</h2>
                
                <div class="form-group">
                    <label for="total-bill">Total Bill (XLM)</label>
                    <input type="number" id="total-bill" placeholder="0.00" min="0" step="0.0000001">
                </div>

                <div class="form-group">
                    <label>Recipients</label>
                    <div id="recipients-list">
                        <!-- Dynamic recipient inputs go here -->
                    </div>
                    <button id="add-recipient-btn" class="btn secondary add-btn">+ Add Recipient</button>
                </div>

                <div class="split-summary hidden" id="split-summary">
                    <h3>Split Breakdown</h3>
                    <p>Each person pays: <strong id="amount-per-person">0 XLM</strong></p>
                </div>

                <button id="send-btn" class="btn primary full-width mt-4" disabled>Send Split Payments</button>
            </div>

            <div id="transaction-status" class="card glass hidden mt-4 status-card">
                <h3 id="status-title">Transaction Status</h3>
                <p id="status-message"></p>
                <a id="explorer-link" href="#" target="_blank" class="hidden btn secondary outline">View on Stellar Expert</a>
            </div>
        </main>
    </div>

    <!-- Main Logic -->
    <script type="module" src="app.js"></script>
</body>
</html>
